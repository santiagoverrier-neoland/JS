<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Mi página web</h1>

    <ul>
        <li>item 1</li>
        <li>item 2</li>
        <li>item 3</li>
        <li>item 4</li>
    </ul>

    <script>
        const titulo = document.querySelector("h1")
        titulo.style = "color: red; background-color: yellow"

        const items = document.querySelectorAll("li")

        for (let item of items) {
            item.style = "font-size: 20px; font-family: 'Arial'; background-color: beige"
        }

    </script>
</body>
</html>
