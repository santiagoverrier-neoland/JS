<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .destacado {
            background-color: yellow;
        }
        .masGrande {
            font-size: 100px;
        }
        .masChico {
            font-size: 10px;
        }
    </style>
</head>
<body>
    
    <h1>Mi página web</h1>

    <script>
        const titulo = document.querySelector("h1")
        titulo.classList.add('destacado')
        titulo.classList.remove('destacado')
        titulo.classList.add('destacado', 'masGrande')
        titulo.classList.replace('masGrande','masChico')
    </script>
</body>
</html>
