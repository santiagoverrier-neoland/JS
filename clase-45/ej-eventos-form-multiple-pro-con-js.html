<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        input:user-invalid {
            border: 2px solid red;
            background-color: rgb(255, 228, 228);
        }

        input:user-valid {
            border: 2px solid green;
            background-color: lightgreen
        }

        .error {
            display: none;
            font-size: 60px;
            color: red;
            padding: 20px;
            border: solid 3px red;
            background-color: rgb(255, 224, 224);
        }
    </style>
</head>

<body>

    <strong class="error"></strong>

    <form>
        <div>
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" title="No pueden ser números" pattern="^[a-zA-Z]{1,10}$"
                placeholder="ej: José" required>
        </div>
        <div>
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" name="apellido">
        </div>
        <div>
            <label for="localidad">Localidad</label>
            <input type="text" id="localidad" name="localidad">
        </div>
        <div>
            <label for="pais">País</label>
            <input type="text" id="pais" name="pais">
        </div>
        <div>
            <label for="telefono">Teléfono</label>
            <input type="tel" name="telefono" id="telefono" placeholder="10-2000-1000">
        </div>
        <div>
            <label for="edad">Edad</label>
            <input type="text" id="edad" name="edad">
        </div>
        <div>
            <label for="correo">Correo Electrónico</label>
            <input type="text" id="correo" name="correo">
        </div>

        <button type="submit">Enviar</button>

    </form>



    <p></p>

    <script>
        const formulario = document.querySelector('form')

        formulario.addEventListener('submit', function (event) {
            event.preventDefault()
            const formData = new FormData(formulario)

            const edad = Number(formData.get("edad"))
            if (formData.has("edad") >= 18) {
                console.log("Es mayor de edad, puede registrarse")
            } else {
                console.error("No se puede seguir el registro")
                const error = document.querySelector(".error")
                error.innerHTML = "⚠️ SE HA DETECTADO QUE SOS MENOR DE EDAD ⚠️"
                error.style.display = "block"
                return "No se puede seguir el registro"
            }

            const datos = Object.fromEntries(formData.entries())


            return datos
        })
    </script>
</body>

</html>
